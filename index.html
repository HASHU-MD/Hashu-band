<script>
const USER = 'MR HASHUU';

let musicPlaying = false;

function toggleMusic(){
    const music = document.getElementById('bgMusic');
    const icon = document.getElementById('musicIcon');
    const btn = document.getElementById('musicBtn');
    
    if(musicPlaying){
        music.pause();
        icon.className = 'fas fa-volume-mute';
        btn.classList.add('muted');
        musicPlaying = false;
    }else{
        music.volume = 0.3;
        music.play();
        icon.className = 'fas fa-volume-up';
        btn.classList.remove('muted');
        musicPlaying = true;
    }
}

function checkLogin(){
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    if(u === USER && p === PASS){
        errorMsg.classList.remove('show');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainSite').classList.add('show');
        sessionStorage.setItem('loggedIn', 'true');
        
        // Auto play music on login
        if(!musicPlaying){
            setTimeout(()=>toggleMusic(), 500);
        }
    }else{
        errorMsg.classList.add('show');
        document.getElementById('password').value = '';
        setTimeout(()=>errorMsg.classList.remove('show'), 3000);
    }
}

function logout(){
    sessionStorage.removeItem('loggedIn');
    document.getElementById('mainSite').classList.remove('show');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('waNumber').value = '';
    document.getElementById('terminal').classList.remove('show');
    document.getElementById('termBody').innerHTML = '';
    
    // Stop music on logout
    if(musicPlaying){
        toggleMusic();
    }
}

    const termBody = document.getElementById('termBody');

    div.className = 'log-line';
    div.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${msg}</span>`;

    termBody.scrollTop = termBody.scrollHeight;
}
